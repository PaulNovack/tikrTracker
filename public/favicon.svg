<svg width="166" height="166" viewBox="0 0 166 166" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background -->
  <rect width="166" height="166" rx="35" fill="#1E8449"/>
  
  <!-- Upward trending line chart (checkmark style) -->
  <path 
    d="M35 115 L55 95 L75 115 L140 50" 
    stroke="white" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />
  
  <!-- Upward arrow -->
  <path 
    d="M125 35 L145 35 L145 55" 
    stroke="white" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />
  <path 
    d="M145 35 L120 60" 
    stroke="white" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />
  
  <!-- Candlestick 1 -->
  <rect x="50" y="110" width="10" height="25" fill="white" opacity="0.9"/>
  <line x1="55" y1="105" x2="55" y2="140" stroke="white" stroke-width="2"/>
  
  <!-- Candlestick 2 -->
  <rect x="75" y="100" width="10" height="30" fill="white" opacity="0.9"/>
  <line x1="80" y1="95" x2="80" y2="140" stroke="white" stroke-width="2"/>
  
  <!-- Candlestick 3 -->
  <rect x="100" y="85" width="10" height="35" fill="white" opacity="0.9"/>
  <line x1="105" y1="80" x2="105" y2="140" stroke="white" stroke-width="2"/>
  
  <!-- Candlestick 4 -->
  <rect x="125" y="70" width="10" height="40" fill="white" opacity="0.9"/>
  <line x1="130" y1="65" x2="130" y2="140" stroke="white" stroke-width="2"/>
</svg>

services:
  # ============================================================
  # Main application: Ubuntu + PHP 8.3 + Python 3.12 + Node 22
  # ============================================================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: laravel-invest-app
    tty: true          # unbuffered output — shows real-time progress
    env_file:
      - ../.secret       # load Alpaca keys, OpenAI keys, mail credentials
    ports:
      - "${APP_PORT:-8080}:8080"      # Apache / web
      - "${REVERB_PORT:-8081}:8081"   # Reverb WebSocket server
      - "${VITE_PORT:-5173}:5173"     # Vite dev server (npm run dev)
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://127.0.0.1:8080}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-tikrTrackerTest}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-laravel}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - BROADCAST_CONNECTION=reverb
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8081
      - REVERB_SCHEME=http
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=file
    volumes:
      # Mount the entire project for live development
      - ..:/var/www/html/laravel-invest
      # Exclude the venv (use container's built venv)
      - /var/www/html/laravel-invest/.venv
      # Exclude node_modules (use container's built ones)
      - /var/www/html/laravel-invest/node_modules
      # Exclude vendor (use container's built ones)
      - /var/www/html/laravel-invest/vendor
      # Persist storage data (logs, cache, etc.)
      - app-storage:/var/www/html/laravel-invest/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-invest-net
    restart: unless-stopped

  # ============================================================
  # Redis 7 – caching, queues, session, broadcasting
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: laravel-invest-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - laravel-invest-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # MySQL 8.0 – primary database with persistent volume
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: laravel-invest-mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-tikrTrackerTest}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-time-zone=+00:00
      --innodb-buffer-pool-size=512M
      --tmp-table-size=536870912
      --max-heap-table-size=536870912
    volumes:
      # Persistent MySQL data volume
      - mysql-data:/var/lib/mysql
    networks:
      - laravel-invest-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

# ============================================================
# Persistent named volumes
# ============================================================
volumes:
  mysql-data:
    name: laravel-invest-mysql-data
    driver: local
  redis-data:
    name: laravel-invest-redis-data
    driver: local
  app-storage:
    name: laravel-invest-app-storage
    driver: local

# ============================================================
# Shared network
# ============================================================
networks:
  laravel-invest-net:
    name: laravel-invest-net
    driver: bridge

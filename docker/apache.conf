<VirtualHost *:8080>
    ServerName localhost

    DocumentRoot /var/www/html/laravel-invest/public

    <Directory /var/www/html/laravel-invest/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# Listen on port 8080
Listen 8080
